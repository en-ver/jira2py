name: documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: ~/.cache
          restore-keys: |
            mkdocs-material-

      - run: pip install mkdocs-material "mkdocs>=1.6,<2" mkdocs-llmstxt griffe

      - name: Generate API reference JSON
        run: |
          griffe dump jira2py --search src -o docs/api-reference.json 2>/dev/null
          python -c "
          import json, re, pathlib
          data = pathlib.Path('docs/api-reference.json').read_text()
          # Normalize absolute paths to relative
          data = re.sub(r'\"filepath\": \"[^\"]*?/src/', '\"filepath\": \"src/', data)
          data = re.sub(r'\"repository\": \"[^\"]*\"', '\"repository\": \".\"', data)
          pathlib.Path('docs/api-reference.json').write_text(data)
          "

      - name: Configure Git credentials
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - run: mkdocs gh-deploy --force
