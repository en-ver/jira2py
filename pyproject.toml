[build-system]
requires = ["setuptools >= 77.0.3"]
build-backend = "setuptools.build_meta"

[project]
name = "jira2py"
version = "0.4.0"
description = "The Python library to interact with Atlassian Jira REST API"
readme = "README.md"
authors = [{ name = "nEver1", email = "7fhhwpuuo@mozmail.com" }]
license = "MIT"
license-files = ["LICEN[CS]E*"]
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
]
dependencies = [
    "email-validator~=2.3.0",
    "pydantic~=2.11.0",
    "pydantic-core~=2.33.0",
    "python-dotenv~=1.1.0",
    "httpx~=0.28.0",
]

[project.urls]
Homepage = "https://github.com/en-ver/jira2py"
Repository = "https://github.com/en-ver/jira2py"

[project.optional-dependencies]
deployment = ["setuptools>=42", "wheel", "twine", "build"]
dev = ["ipykernel"]

[tool.setuptools.packages.find]
where = ["."]
include = ["jira2py*"]
