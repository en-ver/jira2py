site_name: jira2py
site_description: A lightweight, type-safe Python client for the Jira Cloud REST API
site_author: nEver
site_url: https://jira2py.org/
copyright: Copyright &copy; 2025 nEver

repo_name: en-ver/jira2py
repo_url: https://github.com/en-ver/jira2py

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - llmstxt:
      full_output: llms-full.txt
      sections:
        Getting Started:
          - installation.md
        User Guide:
          - guide/*.md
        API Reference:
          - api/*.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - High-level Helpers: guide/high-level-helpers.md
      - Configuration: guide/configuration.md
      - Error Handling: guide/error-handling.md
      - Rate Limiting: guide/rate-limiting.md
  - API Reference:
      - Overview: api/index.md
      - High-level Helpers: api/helpers.md
      - JiraAPI: api/jira-api.md
      - Issues: api/issues.md
      - Issue Search: api/issue-search.md
      - Issue Comments: api/issue-comments.md
      - Issue Worklogs: api/issue-worklogs.md
      - Issue Fields: api/issue-fields.md
      - Issue Links: api/issue-links.md
      - Projects: api/projects.md
      - Metadata: api/metadata.md
      - Filters: api/filters.md
      - Attachments: api/attachments.md
      - Users: api/users.md
      - Exceptions: api/exceptions.md
  - Changelog: changelog.md
